<!DOCTYPE html>
<html>
 <head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title> Đạt </title>
  <style>
	body {
	 text-align: center;
	 color: #ffffff;
	 animation: changeBg 2s infinite;
	}  
	
	@keyframes changeBg {
	 0% { background-color: #ffffff;}
	 5% { background-color: #e0eab3;}
	 10% {background-color: #c6d68a;}
	 15% { background-color: #9bae2b;}
	 20% { background-color: #ff009d;}
	 25% { background-color: #ac1390;}
	 30% { background-color: #a821d9;}
	 35% { background-color: #ee00ff;}
	 40% { background-color: #d189f5;}
	 45% { background-color: #b61192;}
	 50% { background-color: #8b368f;}
	 55% { background-color: #c1709b;}
	 60% { background-color: #990975;}
	 65% { background-color: #550d6b;}
	 70% { background-color: #ba2dc2;}
	 75% { background-color: #c81e1e;}
	 80% { background-color: #93132e;}
	 85% { background-color: #e77373;}
	 90% { background-color: #ff0000;}
	 95% { background-color: #700202;}
	 100% { background-color: #ffffff;}
	}

    h1 {
	 border: none;
	 background-color: #ffffff;
	 color: #000000;
	 padding: 10px 20px;
	 border-radius: 4px;
	 margin: 40px 400px;
	}

	p {
	 color:#ffffff;
	 font-weight: 800;
	}
	
    button {
	 border: none;
	 background-color: #ffff00;
	 color: #00008b;
	 font-weight: 700;
	 padding: 10px 40px;
	 cursor: pointer;
	 transition: background 1s;
	 border-radius: 8px;
	}
	
	button:hover {
	 background-color: #ff0000;
	 transform: scale(1.8);
     transition: transform 0.3s;
	}
	
  </style>
 </head>

 </body>
</html>
